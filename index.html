<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robert's 35 Splooge Counter</title>
  <style>
    /* General Layout */
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: black; /* Black background for a dad-ish theme */
      color: white; /* White text for readability */
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    h1 {
      font-size: 2.5rem;
      color: #f1c40f; /* Golden yellow for heading */
      margin: 20px 0;
      text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.9); /* Classic bold style */
    }

    #countdown {
      font-size: 1.5rem;
      margin: 20px;
      color: white; /* White text for countdown */
    }

    /* Columns */
    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      width: 90%;
      max-width: 1200px;
    }

    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .column h2 {
      margin-bottom: 10px;
      font-size: 1.5rem;
      color: #3498db; /* Soft blue for h2 headings */
    }

    .bubble {
      cursor: pointer;
      font-size: 1rem;
      text-align: center;
      line-height: 2;
      margin: 5px 0;
      padding: 10px 20px;
      width: 80%;
      border-radius: 25px;
      background-color: #1976d2; /* Proud dad-blue for incomplete tasks */
      color: white;
      box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.7);
      transition: background-color 0.3s ease, transform 0.2s;
    }

    .bubble.complete {
      background-color: #888; /* Grey for completed tasks */
      color: white;
      text-decoration: line-through; /* Strike-through for completed */
    }

    .bubble:hover:not(.complete) {
      background-color: #1565c0; /* Hover style for uncompleted tasks */
    }

    /* Dad-Themed Widgets Section */
    .dad-themes {
      margin: 20px 0;
      padding: 20px;
      text-align: center;
      background: #333;
      border-radius: 15px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
    }

    .dad-widget {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px 0;
      background: #444;
      padding: 15px;
      border-radius: 10px;
      color: #f1c40f; /* Gold for widgets */
    }

    .dad-widget img {
      width: 40px;
      height: 40px;
      margin-right: 10px;
    }

    /* Completion Message */
    .completion-message {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      background: rgba(255, 255, 255, 0.9);
      color: black;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      z-index: 20;
    }

    .completion-message span {
      color: #ff7043;
      font-weight: bold;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      margin-top: 30px;
      color: white;
      background: #222;
      border-top: 3px solid #fff;
    }
  </style>
</head>
<body>
  <h1>Robert's 35 Splooge Counter</h1>
  <p id="countdown">Splooges Remaining: 35</p>

  <!-- Columns for To-Go and Completed -->
  <div class="container">
    <div class="column" id="to-go-column">
      <h2>To Go</h2>
    </div>
    <div class="column" id="completed-column">
      <h2>Completed</h2>
    </div>
  </div>

  <!-- Dad-Themed Widgets Section -->
  <div class="dad-themes">
    <h2>Random Dad Vibes</h2>
    <div class="dad-widget">
      <img src="https://i.imgur.com/kAuAZV3.png" alt="Wrench">
      <span>Duct tape fixes everything!</span>
    </div>
    <div class="dad-widget">
      <img src="https://i.imgur.com/oYiT2N7.png" alt="Grill">
      <span>Grill God in action. 🍔</span>
    </div>
    <div class="dad-widget">
      <img src="https://i.imgur.com/VXN9d4F.png" alt="Remote control">
      <span>Default TV operator 🎮</span>
    </div>
  </div>

  <!-- Completion Message -->
  <div class="completion-message" id="completion-message">
    Congrats, you're <span>kid free</span>! Pump away, Tiger 🐅 😉!
  </div>

  <footer>
    Dads are the real MVPs! 💪
  </footer>

  <script>
    // Variables
    const toGoColumn = document.getElementById("to-go-column");
    const completedColumn = document.getElementById("completed-column");
    const completionMessage = document.getElementById("completion-message");
    const countdown = document.getElementById("countdown");

    let remainingSplooges = 35;

    // Add bubbles to "To Go" column
    for (let i = 1; i <= 35; i++) {
      const bubble = document.createElement("div");
      bubble.textContent = `Splooge ${i}`;
      bubble.dataset.id = i;
      bubble.className = "bubble";
      toGoColumn.appendChild(bubble);
    }

    // Handle Click Logic for Bubbles
    document.querySelectorAll(".bubble").forEach((bubble) => {
      bubble.addEventListener("click", () => {
        const isComplete = bubble.classList.toggle("complete");
        if (isComplete) {
          completedColumn.appendChild(bubble);
          remainingSplooges--;
        } else {
          toGoColumn.appendChild(bubble);
          remainingSplooges++;
        }
        countdown.textContent = `Splooges Remaining: ${remainingSplooges}`;
        completionMessage.style.display = remainingSplooges === 0 ? "block" : "none";
      });
    });
  </script>
</body>
</html>
