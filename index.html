<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robert's Countdown Goal</title>
  <style>
    /* General Layout */
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e1e1e1, #f7f7f7);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    h1 {
      font-size: 2rem;
      color: #333;
      margin-top: 1rem;
    }

    #countdown {
      font-size: 1.5rem;
      margin: 20px 0;
    }

    /* Splooge Items */
    .splooge {
      cursor: pointer;
      font-size: 1rem;
      text-align: center;
      line-height: 2;
      margin: 10px auto;
      display: inline-block;
      padding: 10px 20px;
      background: #555;
      color: white;
      border-radius: 30px;
      text-decoration: none; /* Ensure no underline initially */
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s ease, transform 0.2s;
    }

    .splooge.complete {
      background-color: #555; /* Retain original background color */
      color: #888; /* Muted gray for completed text */
      text-decoration: line-through; /* Add strike-through effect */
    }

    .splooge:not(.complete):hover {
      background-color: #333;
    }

    /* Fireworks Canvas */
    #fireworks-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    /* Completion Message */
    .completion-message {
      display: none;
      margin-top: 30px;
      font-size: 1.5rem;
      background: #ffccbc;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
    }

    .completion-message span {
      color: #ff7043;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Robert's 35-Splooge Countdown</h1>
  <p id="countdown">Splooges Remaining: 35</p>
  <div id="splooge-list">
    <div class="splooge" data-splooge-id="1">Splooge 1</div>
    <div class="splooge" data-splooge-id="2">Splooge 2</div>
    <div class="splooge" data-splooge-id="3">Splooge 3</div>
    <!-- Dynamically generate more splooges in JavaScript -->
  </div>

  <!-- Completion Message -->
  <div class="completion-message" id="completion-message">
    Congrats, you're <span>kid free</span>! Pump away, Tiger 🐅 😉!
  </div>

  <!-- Fireworks Canvas -->
  <canvas id="fireworks-canvas"></canvas>

  <script>
    // Generate 35 splooge elements dynamically
    const sploogeList = document.getElementById('splooge-list');
    const completionMessage = document.getElementById('completion-message');
    for (let i = 4; i <= 35; i++) {
      const sploogeDiv = document.createElement('div');
      sploogeDiv.className = 'splooge';
      sploogeDiv.dataset.sploogeId = i;
      sploogeDiv.textContent = `Splooge ${i}`;
      sploogeList.appendChild(sploogeDiv);
    }

    const splooges = document.querySelectorAll('.splooge');
    const countdown = document.getElementById('countdown');
    const fireworksCanvas = document.getElementById('fireworks-canvas');
    const ctx = fireworksCanvas.getContext('2d');
    let remainingSplooges = 35;

    // Resize Canvas for Fireworks
    function resizeCanvas() {
      fireworksCanvas.width = window.innerWidth;
      fireworksCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Fireworks Effect
    const particles = [];
    function createFirework(x, y) {
      const colors = ['white']; // Fireworks color (white only)
      for (let i = 0; i < 50; i++) {
        particles.push({
          x,
          y,
          radius: Math.random() * 3 + 2,
          color: colors[0],
          speedX: (Math.random() - 0.5) * 10,
          speedY: (Math.random() - 0.5) * 10,
          alpha: 1,
        });
      }
    }

    function animateFireworks() {
      ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
      particles.forEach((particle, i) => {
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
        ctx.fillStyle = particle.color;
        ctx.globalAlpha = particle.alpha;
        ctx.fill();

        particle.x += particle.speedX;
        particle.y += particle.speedY;
        particle.alpha -= 0.02;

        if (particle.alpha <= 0) {
          particles.splice(i, 1);
        }
      });

      requestAnimationFrame(animateFireworks);
    }
    animateFireworks();

    // Fireworks Triggered on Complete
    function triggerFireworks() {
      const x = Math.random() * fireworksCanvas.width;
      const y = Math.random() * fireworksCanvas.height;
      createFirework(x, y);
    }

    // Handle Splooge Clicks
    splooges.forEach(splooge => {
      splooge.addEventListener('click', () => {
        const isComplete = splooge.classList.toggle('complete');
        remainingSplooges += isComplete ? -1 : 1;
        countdown.textContent = `Splooges Remaining: ${remainingSplooges}`;

        if (isComplete) {
          triggerFireworks();
        }

        // Show Completion Message
        if (remainingSplooges === 0) {
          completionMessage.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
