<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robert's Countdown Goal</title>
  <style>
    /* General Layout */
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #e3f2fd, #bbdefb);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    h1 {
      font-size: 2rem;
      color: #1976d2;
      margin-top: 1rem;
    }

    #countdown {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    /* Splooge Items */
    .splooge {
      cursor: pointer;
      font-size: 1rem;
      line-height: 2;
      margin: 10px auto;
      display: inline-block;
      padding: 10px 20px;
      background: #1976d2;
      color: white;
      border-radius: 30px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .splooge.complete {
      background-color: #4caf50;
      color: white;
      transform: scale(1.1);
    }

    .splooge:not(.complete):hover {
      background-color: #1565c0;
    }

    /* Milk Splash Effect */
    #milk-splatter {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .milk-splash {
      position: absolute;
      background-color: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      animation: splash 0.8s ease-out forwards;
      transform-origin: center;
    }

    @keyframes splash {
      0% {
        width: 0;
        height: 0;
        opacity: 1;
      }
      50% {
        opacity: 0.8;
      }
      100% {
        width: 400px;
        height: 400px;
        opacity: 0;
      }
    }

    /* Completion Message */
    .completion-message {
      display: none;
      margin-top: 30px;
      font-size: 1.5rem;
      background: #ffccbc;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
    }

    .completion-message span {
      color: #ff7043;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Robert's 35-Splooge Countdown</h1>
  <p id="countdown">Splooges Remaining: 35</p>
  <div id="splooge-list">
    <div class="splooge" data-splooge-id="1">Splooge 1</div>
    <div class="splooge" data-splooge-id="2">Splooge 2</div>
    <div class="splooge" data-splooge-id="3">Splooge 3</div>
    <!-- Additional splooges will be added dynamically via JavaScript -->
  </div>

  <!-- Completion Message -->
  <div class="completion-message" id="completion-message">
    Congrats, you're <span>kid free</span>! Pump away, Tiger 🐅 😉!
  </div>

  <!-- Milk Splatter -->
  <div id="milk-splatter"></div>

  <script>
    // Generate 35 splooge elements dynamically
    const sploogeList = document.getElementById('splooge-list');
    const completionMessage = document.getElementById('completion-message');
    for (let i = 4; i <= 35; i++) {
      const sploogeDiv = document.createElement('div');
      sploogeDiv.className = 'splooge';
      sploogeDiv.dataset.sploogeId = i;
      sploogeDiv.textContent = `Splooge ${i}`;
      sploogeList.appendChild(sploogeDiv);
    }

    const splooges = document.querySelectorAll('.splooge');
    const countdown = document.getElementById('countdown');
    const milkSplatter = document.getElementById('milk-splatter');
    let remainingSplooges = 35;

    // Handle Click Events
    splooges.forEach(splooge => {
      splooge.addEventListener('click', () => {
        const isComplete = splooge.classList.toggle('complete');
        remainingSplooges += isComplete ? -1 : 1;
        countdown.textContent = `Splooges Remaining: ${remainingSplooges}`;

        if (isComplete) {
          triggerMilkSplash();
        }

        // Show completion message
        if (remainingSplooges === 0) {
          completionMessage.style.display = 'block';
        }
      });
    });

    // Generate Milk Splash Effect
    function triggerMilkSplash() {
      const splash = document.createElement('div');
      splash.className = 'milk-splash';
      splash.style.left = `${Math.random() * window.innerWidth}px`;
      splash.style.top = `${Math.random() * window.innerHeight / 2}px`;
      milkSplatter.appendChild(splash);

      // Remove splash after animation
      setTimeout(() => {
        milkSplatter.removeChild(splash);
      }, 800); // 800ms matches the animation duration
    }

    // Update Splatter Size on Resize
    window.addEventListener('resize', () => {
      milkSplatter.style.width = window.innerWidth + 'px';
      milkSplatter.style.height = window.innerHeight + 'px';
    });
  </script>
</body>
</html>
