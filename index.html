<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robert's Countdown Goal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f9;
      color: #333;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    #countdown {
      font-size: 24px;
      font-weight: bold;
    }

    .splooge {
      cursor: pointer;
      font-size: 18px;
      line-height: 2;
      margin: 5px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 200px;
      border: 2px solid #333;
      border-radius: 8px;
      transition: background-color 0.3s, color 0.3s;
    }

    .splooge.complete {
      background-color: #4caf50;
      color: white;
    }

    .splooge:not(.complete):hover {
      background-color: #e2e8f0;
    }

    #milk-splatter {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100%;
      height: 100%;
      background: transparent;
      pointer-events: none;
    }

    .splatter-animation {
      position: absolute;
      background-color: white;
      border-radius: 50%;
      pointer-events: none;
      animation: splatter 0.8s ease-out forwards;
    }

    @keyframes splatter {
      0% {
        width: 0;
        height: 0;
        opacity: 1;
      }
      50% {
        opacity: 0.8;
      }
      100% {
        width: 300px;
        height: 300px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <h1>Robert's 35-Splooge Countdown</h1>
  <p id="countdown">Splooges Remaining: 35</p>
  <div id="splooge-list">
    <div class="splooge" data-splooge-id="1">Splooge 1</div>
    <div class="splooge" data-splooge-id="2">Splooge 2</div>
    <div class="splooge" data-splooge-id="3">Splooge 3</div>
    <!-- Add more splooges dynamically using JS -->
  </div>

  <div id="milk-splatter"></div>

  <script>
    // Generate 35 splooge elements
    const sploogeList = document.getElementById('splooge-list');
    for (let i = 4; i <= 35; i++) {
      const sploogeDiv = document.createElement('div');
      sploogeDiv.className = 'splooge';
      sploogeDiv.dataset.sploogeId = i;
      sploogeDiv.textContent = `Splooge ${i}`;
      sploogeList.appendChild(sploogeDiv);
    }

    const splooges = document.querySelectorAll('.splooge');
    const countdown = document.getElementById('countdown');
    const milkSplatter = document.getElementById('milk-splatter');
    let remainingSplooges = 35;

    splooges.forEach(splooge => {
      splooge.addEventListener('click', () => {
        const isComplete = splooge.classList.toggle('complete');
        remainingSplooges += isComplete ? -1 : 1;
        countdown.textContent = `Splooges Remaining: ${remainingSplooges}`;

        if (isComplete) {
          triggerMilkSplatter();
        }
      });
    });

    // Milk Splatter Effect
    function triggerMilkSplatter() {
      const splatter = document.createElement('div');
      splatter.className = 'splatter-animation';
      splatter.style.left = `${Math.random() * window.innerWidth}px`;
      splatter.style.top = `${Math.random() * window.innerHeight / 2}px`;

      milkSplatter.appendChild(splatter);

      setTimeout(() => {
        milkSplatter.removeChild(splatter);
      }, 800); // Remove splatter after animation ends
    }

    window.addEventListener('resize', () => {
      milkSplatter.style.width = window.innerWidth + 'px';
      milkSplatter.style.height = window.innerHeight + 'px';
    });
  </script>
</body>
</html>
